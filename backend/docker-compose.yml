version: '3.9'

services:

  mysql:

    image: mysql:8.0

    container_name: hr_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hr_attrition

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init:/docker-entrypoint-initdb.d
volumes:
  mysql_data: